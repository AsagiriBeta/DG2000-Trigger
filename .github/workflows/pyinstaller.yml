# 自动版本号、自动打 tag、自动构建、自动发布 Release。
name: Build and Release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      release_type:
        description: "Version bump type"
        required: false
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  version:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.bump.outputs.version }}
      tag: ${{ steps.bump.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Bump version and tag
        id: bump
        env:
          RELEASE_TYPE: ${{ github.event.inputs.release_type || 'patch' }}
        run: |
          python - <<'PY'
          import pathlib
          import re
          import tomllib
          import os

          pyproject = pathlib.Path("pyproject.toml")
          init_py = pathlib.Path("dg2000_trigger/__init__.py")

          data = tomllib.loads(pyproject.read_text(encoding="utf-8"))
          current = data["project"]["version"]
          major, minor, patch = map(int, current.split("."))

          release_type = os.environ.get("RELEASE_TYPE", "patch")
          if release_type == "major":
              major += 1
              minor = 0
              patch = 0
          elif release_type == "minor":
              minor += 1
              patch = 0
          else:
              patch += 1

          new_version = f"{major}.{minor}.{patch}"
          new_tag = f"v{new_version}"

          pyproject_text = pyproject.read_text(encoding="utf-8")
          pyproject_text = re.sub(
              r'(?m)^version = "[^"]+"$',
              f'version = "{new_version}"',
              pyproject_text,
              count=1,
          )
          pyproject.write_text(pyproject_text, encoding="utf-8")

          init_text = init_py.read_text(encoding="utf-8")
          init_text = re.sub(
              r'(?m)^__version__ = "[^"]+"$',
              f'__version__ = "{new_version}"',
              init_text,
              count=1,
          )
          init_py.write_text(init_text, encoding="utf-8")

          output = pathlib.Path(os.environ["GITHUB_OUTPUT"])
          with output.open("a", encoding="utf-8") as f:
              f.write(f"version={new_version}\n")
              f.write(f"tag={new_tag}\n")
          PY

      - name: Commit and push version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml dg2000_trigger/__init__.py
          git commit -m "chore(release): ${{ steps.bump.outputs.tag }} [skip ci]"
          git tag "${{ steps.bump.outputs.tag }}"
          git push origin HEAD:main
          git push origin "${{ steps.bump.outputs.tag }}"

  package:
    needs: version
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: macos
            arch: arm64
            artifact_name: DG2000Trigger-macos-arm64
          - os: windows-2022
            target: windows
            arch: x64
            artifact_name: DG2000Trigger-windows-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.version.outputs.tag }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install project + PyInstaller
        run: |
          python -m pip install -U pip
          python -m pip install ".[build]"

      - name: Build
        run: python -m PyInstaller --noconfirm --clean dg2000_trigger.spec

      - name: Zip (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path "dist/DG2000Trigger" -DestinationPath "dist/DG2000Trigger-${{ needs.version.outputs.tag }}-windows-x64.zip" -Force

      - name: Zip (macOS)
        if: runner.os == 'macOS'
        run: |
          ditto -c -k --sequesterRsrc --keepParent "dist/DG2000Trigger" "dist/DG2000Trigger-${{ needs.version.outputs.tag }}-macos-arm64.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}-${{ needs.version.outputs.tag }}
          path: |
            dist/*.zip

  release:
    needs: [version, package]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: DG2000Trigger-*-${{ needs.version.outputs.tag }}
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          name: ${{ needs.version.outputs.tag }}
          generate_release_notes: true
          files: dist/*.zip
