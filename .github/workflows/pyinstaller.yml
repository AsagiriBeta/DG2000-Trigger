# 在 macOS 与 Windows 上分别打包（PyInstaller 无法从 Mac 交叉生成 Windows .exe）。
name: PyInstaller build

on:
  workflow_dispatch:

jobs:
  package:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact_name: DG2000Trigger-macos-arm64
          - os: windows-latest
            artifact_name: DG2000Trigger-windows-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install project + PyInstaller
        run: |
          python -m pip install -U pip
          python -m pip install ".[build]"

      - name: Build
        run: python -m PyInstaller --noconfirm --clean dg2000_trigger.spec

      - name: Zip (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path "dist/DG2000Trigger" -DestinationPath "dist/DG2000Trigger-windows-x64.zip" -Force

      - name: Zip (macOS)
        if: runner.os == 'macOS'
        run: |
          ditto -c -k --sequesterRsrc --keepParent "dist/DG2000Trigger" "dist/DG2000Trigger-macos-arm64.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            dist/*.zip
